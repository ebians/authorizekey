# nginx.conf – AuthorizeKey reverse proxy (alternative to Caddy)
#
# Place this file at /etc/nginx/sites-available/authorizekey and symlink:
#   ln -s /etc/nginx/sites-available/authorizekey \
#         /etc/nginx/sites-enabled/authorizekey
#
# Prerequisites:
#   openssl req -x509 -nodes -newkey rsa:4096 \
#     -keyout /etc/ssl/private/authorizekey.key \
#     -out    /etc/ssl/certs/authorizekey.crt  \
#     -days   3650 -subj "/CN=your-server-hostname"
#
# For Let's Encrypt: replace the ssl_certificate lines with
#   include /etc/letsencrypt/options-ssl-nginx.conf;
#   ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
#   ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name your-server-hostname;
    return 301  https://$host$request_uri;
}

# ── HTTPS listener ─────────────────────────────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name your-server-hostname;

    # ── TLS ───────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/certs/authorizekey.crt;
    ssl_certificate_key /etc/ssl/private/authorizekey.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header X-Frame-Options           "DENY"                              always;
    add_header X-XSS-Protection          "1; mode=block"                     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" always;

    # ── Upload size limit ─────────────────────────────────────────────
    client_max_body_size 32k;

    # ── Rate limiting ─────────────────────────────────────────────────
    # Define zones in the http {} block of nginx.conf or in a separate
    # /etc/nginx/conf.d/rate_limit.conf file:
    #   limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
    #
    # Then enable here:
    # limit_req zone=login burst=5 nodelay;

    # ── Reverse proxy to Flask/Gunicorn ───────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
